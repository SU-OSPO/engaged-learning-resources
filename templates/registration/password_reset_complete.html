{% extends "base.html" %}

{% block title %}Password updated{% endblock %}

{% block extra_css %}
<style>
    .auth-card {
        max-width: 420px;
        margin: 0 auto;
        padding: 2rem;
        background: #fff;
        border-radius: 12px;
        border: 1px solid rgba(13, 45, 76, 0.1);
        box-shadow: 0 8px 32px rgba(13, 45, 76, 0.08);
    }
    .auth-card h1 {
        font-size: 1.35rem;
        color: var(--su-navy);
        margin: 0 0 1rem;
    }
    .auth-actions {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.65rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Password updated</h1>
    <p style="margin: 0; color: var(--su-gray-dark); font-size: 0.95rem; line-height: 1.55;">
        Your password has been set. You can log in with your university email and new password.
    </p>
    <div class="auth-actions">
        <a href="{% url 'accounts:login' %}" class="auth-outline">Log in</a>
    </div>
</div>
{% endblock %}
